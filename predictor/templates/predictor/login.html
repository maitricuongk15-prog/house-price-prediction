{% extends 'predictor/base.html' %}
{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="container page">
  <div class="form-card" style="max-width:420px">
    <div class="text-center mb-24">
      <div style="font-size:36px">🔑</div>
      <div class="section-title mt-8">Đăng nhập NhàAI</div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input class="form-input" type="text" name="username" placeholder="username" autofocus>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input class="form-input" type="password" name="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-8" style="font-size:15px;padding:12px">
          Đăng nhập
        </button>
      </div>
    </form>

    <div class="text-center mt-16" style="font-size:14px;color:var(--muted)">
      Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký ngay</a>
    </div>
  </div>
</div>
{% endblock %}
